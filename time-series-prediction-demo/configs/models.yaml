models:
  itransformer:
    display_name: iTransformer
    framework: torch
    adapter: training_project
    config:
      d_model: 32
      n_heads: 4
      e_layers: 2
      d_ff: 64
      dropout: 0.3

  timemixer:
    display_name: TimeMixer
    framework: torch
    adapter: training_project
    config:
      d_model: 32
      d_ff: 64
      e_layers: 2
      dropout: 0.3

  tsmamba:
    display_name: TSMamba
    framework: torch
    adapter: training_project
    config:
      d_model: 32
      d_state: 8
      d_conv: 4
      expand: 2
      n_layers: 1
      patch_len: 8
      dropout: 0.3

  xgboost:
    display_name: XGBoost
    framework: sklearn
    adapter: training_project

  arima:
    display_name: ARIMA
    framework: statsmodels
    adapter: training_project
